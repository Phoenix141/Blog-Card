<!doctype html>
<html lang="en">
  <head>
    <!-- meta-links -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A minimal blog card design" />

    <!-- favicon-link -->
    <link
      rel="icon"
      href="resources/favicon.ico"
      type="image/x-icon"
      sizes="96x96"
    />

    <!-- font-link -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap"
      rel="stylesheet"
    />

    <title>devChallenges.io | Minimal Blog Card</title>

    <!--You are welcome to delete these styles or modify them in your own stylesheet -->
    <style>
      /* root */
      :root {
        /* colors */
        --color-tag: #7c19ee;

        --color-tag-light: #f2eafd;

        --color-border: #e5eaf0;
        --color-background: #fafaf9;
        --card-background: #ffffff;

        --color-heading: #20293a;
        --color-body: #394150;

        /* TYPOGRAPHY */
        /* font family */
        --ff: "Sora", sans-serif;

        /* Font Sizes */
        --text-title: 1.125rem; /* 18px */
        --text-body: 0.875rem; /* 14px */
        --text-small: 0.75rem; /* 12px */
        --text-tag: 0.625rem; /* 10px */

        /* Spacing */
        --spacing-1: 6px;
        --spacing-2: 16px;
        --spacing-3: 20px;
      }

      /* reset */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        background: var(--color-background);
        color: var(--color-body);
        font-family: var(--ff);
        font-weight: 700;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      h1,
      h2,
      h3 {
        color: var(--color-heading);
        font-size: var(--text-title);
      }

      hr {
        border: none;
        background-color: var(--color-border);
        height: 1px;
        margin-bottom: var(--spacing-3);

        width: calc(100% + 36px);

        margin-left: -20px;
        margin-right: -16px;
        margin-bottom: 16px;
      }

      p {
        line-height: 1.5;
      }

      img {
        width: 100%;
        /* height: 100%; */
        object-fit: cover;
        display: block;
        border-radius: 10px;
      }

      /* STYLES */
      /* Card Container */
      .card-container {
        max-width: 368px;
        min-height: 246px;
        background: var(--card-background);
        padding: var(--spacing-2) var(--spacing-2) var(--spacing-3)
          var(--spacing-2);
        border-radius: 15px;
        box-shadow: 8px 8px 20px 0px rgba(85, 85, 85, 0.08);
      }

      .card-image {
        overflow: hidden;
        margin-bottom: var(--spacing-2);
      }

      /* tag */
      .card-tag {
        font-size: var(--text-tag);
        background: var(--color-tag-light);
        color: var(--color-tag);
        padding: var(--spacing-1) var(--spacing-2);
        border-radius: 25px;
        /* font-weight: 700; */
      }

      /* card title */
      .card-title {
        font-size: var(--text-title);
        color: var(--color-heading);
        margin: var(--spacing-2) 0 var(--spacing-1) 0;
      }

      /* card description */
      .card-desc {
        font-size: var(--text-body);
        color: var(--color-body);
        font-weight: 400;
        margin-bottom: var(--spacing-3);
      }

      /* card-author */
      .card-author {
        font-size: var(--text-small);
        color: var(--color-body);
        font-weight: 400;
      }

      /* Author Info */
      .author-info {
        font-size: 14px;
        text-align: center;
        margin-top: 16px;
        color: rgb(55, 65, 81);
      }

      .author-info a {
        text-decoration: none;
      }

      /* media queries */
      @media (width <= 1024px) {
        .card-container {
          margin: 32px;
        }
      }

      @media (width <= 412px) {
        .card-container {
          max-width: 332px;
          min-height: 246px;
        }

        .card-image {
          width: 300px;
          height: 135px;
          margin-bottom: var(--spacing-2);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="card-container">
        <div class="card-image">
          <img
            src="./resources/Cactus.jpg"
            alt="Blog card image"
            width="336"
            height="152"
            loading="eager"
          />
        </div>
        <span class="card-tag">Design</span>
        <h1 class="card-title">Embracing Minimalism</h1>
        <p class="card-desc">
          From minimalist sculptures to minimalist paintings, this blog will
          inspire you to appreciate the beauty that lies in simplicity.
        </p>
        <hr />
        <p class="card-author">Annie Spratt</p>
        <!-- <div class="author-info">
            Coded by <a href="#">Jonah</a> | Challenge by
            <a href="https://www.devchallenges.io?ref=challenge" target="_blank"
              >devChallenges.io</a
            >.
          </div> -->
      </div>
    </main>
  </body>
</html>
